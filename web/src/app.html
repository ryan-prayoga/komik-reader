<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<!-- Without these, iOS treats a home-screen icon as a plain Safari
		     bookmark — full browser chrome, persistent domain bar — instead of
		     an actual standalone app. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Komik" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" href="/icons/icon-192.png" type="image/png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<script>
			// Anti-FOUC: apply theme before first paint.
			(function () {
				try {
					var raw = localStorage.getItem('komik-reader-prefs');
					var theme = raw ? JSON.parse(raw).theme : 'system';
					if (!theme) theme = 'system';
					var dark =
						theme === 'dark' ||
						(theme === 'system' &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.classList.toggle('dark', dark);
				} catch (e) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
