services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:stable
    container_name: komik-reader-suwayomi
    environment:
      - TZ=Asia/Jakarta
      - EXTENSION_REPOS=["https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json"]
      - FLARESOLVERR_ENABLED=true
      - FLARESOLVERR_URL=http://flaresolverr:8191
    volumes:
      - suwayomi_data:/home/suwayomi/.local/share/Tachidesk
    restart: unless-stopped
    depends_on:
      - flaresolverr
    networks:
      - komik

  flaresolverr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: komik-reader-flaresolverr
    init: true
    environment:
      - TZ=Asia/Jakarta
    restart: unless-stopped
    networks:
      - komik

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: komik-reader-web
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Trust Caddy's X-Forwarded-For so getClientAddress() sees the real client
      # IP (per-IP rate limiting). Caddy sets XFF = {remote_host}, depth 1.
      - ADDRESS_HEADER=X-Forwarded-For
      - XFF_DEPTH=1
      - ORIGIN=${ORIGIN:-https://komik.ryanprayoga.dev}
      - SUWAYOMI_URL=http://suwayomi:4567
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required}
      - AUTH_DB_PATH=/app/data/auth.db
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - auth_data:/app/data
    ports:
      - "127.0.0.1:4311:3000"
    depends_on:
      - suwayomi
    restart: unless-stopped
    networks:
      - komik

networks:
  komik:

volumes:
  suwayomi_data:
  auth_data: